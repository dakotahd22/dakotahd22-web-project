<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact GreenTech Solutions</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main>
    <section>
        <h2>Contact Us</h2>

        <p>
            Feel free to contact GreenTech Solutions for more information
            about our eco-friendly products and services we provide.
        </p>
    </section>

    <section>

        <form id="contactForm">

            <label for="name">Name</label><br>
            <input type="text" id="name" placeholder="Enter your name"><br><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" placeholder="Enter your email address"><br><br>

            <label for="message">Message</label><br>
            <textarea id="message" rows="5" cols="40" placeholder="Enter your message"></textarea><br><br>

            <button type="submit">Submit</button>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 GreenTech Solutions</p>
</footer>

<script src="javascript/script.js"></script>

</body>
</html>
